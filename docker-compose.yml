networks:
  alexandria_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:

services:
  # ─── Reverse Proxy ──────────────────────────────────────────────────────────
  proxy:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    networks:
      - alexandria_net
    restart: unless-stopped

  # ─── API (NestJS) ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./services/api
      target: development
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      NODE_ENV: development
    volumes:
      - ./services/api/src:/app/src:ro
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - alexandria_net
    restart: unless-stopped

  # ─── Web (Next.js) ──────────────────────────────────────────────────────────
  web:
    build:
      context: ./services/web
      target: development
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: development
    volumes:
      - ./services/web/app:/app/app:ro
      - ./services/web/components:/app/components:ro
    networks:
      - alexandria_net
    restart: unless-stopped

  # ─── Image Generation (Python/Flask) ────────────────────────────────────────
  image-gen:
    build:
      context: ./services/image-gen
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      FLASK_ENV: development
    depends_on:
      storage:
        condition: service_healthy
    networks:
      - alexandria_net
    restart: unless-stopped

  # ─── Worker (BullMQ) ────────────────────────────────────────────────────────
  worker:
    build:
      context: ./services/worker
      target: development
    env_file: .env
    environment:
      NODE_ENV: development
    depends_on:
      cache:
        condition: service_healthy
    networks:
      - alexandria_net
    restart: unless-stopped

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-alexandria}
      POSTGRES_USER: ${DB_USER:-alexandria}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-alexandria} -d ${DB_NAME:-alexandria}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alexandria_net
    restart: unless-stopped

  # ─── Redis ──────────────────────────────────────────────────────────────────
  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alexandria_net
    restart: unless-stopped

  # ─── MinIO (S3-compatible storage) ──────────────────────────────────────────
  storage:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alexandria_net
    restart: unless-stopped

  # ─── Meilisearch ────────────────────────────────────────────────────────────
  search:
    image: getmeili/meilisearch:v1.7
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-changeme}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - alexandria_net
    restart: unless-stopped

  # ─── Grafana + Prometheus ───────────────────────────────────────────────────
  monitor:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: changeme
    networks:
      - alexandria_net
    restart: unless-stopped
