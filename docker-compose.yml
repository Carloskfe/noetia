networks:
  noetia_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
  prometheus_data:
  grafana_data:

services:
  # ─── Reverse Proxy ──────────────────────────────────────────────────────────
  proxy:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    networks:
      - noetia_net
    restart: unless-stopped

  # ─── API (NestJS) ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./services/api
      target: development
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      NODE_ENV: development
    volumes:
      - ./services/api/src:/app/src:ro
      - ./transcriptions:/app/transcriptions:ro
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - noetia_net
    restart: unless-stopped

  # ─── Web (Next.js) ──────────────────────────────────────────────────────────
  web:
    build:
      context: ./services/web
      target: development
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: development
    volumes:
      - ./services/web/app:/app/app:ro
      - ./services/web/components:/app/components:ro
      - ./services/web/lib:/app/lib:ro
      - ./services/web/public:/app/public:ro
      - ./services/web/next.config.js:/app/next.config.js:ro
    networks:
      - noetia_net
    restart: unless-stopped

  # ─── Image Generation (Python/Flask) ────────────────────────────────────────
  image-gen:
    build:
      context: ./services/image-gen
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      FLASK_ENV: development
    depends_on:
      storage:
        condition: service_healthy
    networks:
      - noetia_net
    restart: unless-stopped

  # ─── Worker (BullMQ) ────────────────────────────────────────────────────────
  worker:
    build:
      context: ./services/worker
      target: development
    env_file: .env
    environment:
      NODE_ENV: development
    depends_on:
      cache:
        condition: service_healthy
    networks:
      - noetia_net
    restart: unless-stopped

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-noetia}
      POSTGRES_USER: ${DB_USER:-noetia}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-noetia} -d ${DB_NAME:-noetia}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - noetia_net
    restart: unless-stopped

  # ─── Redis ──────────────────────────────────────────────────────────────────
  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - noetia_net
    restart: unless-stopped

  # ─── MinIO (S3-compatible storage) ──────────────────────────────────────────
  storage:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - noetia_net
    restart: unless-stopped

  # ─── Meilisearch ────────────────────────────────────────────────────────────
  search:
    image: getmeili/meilisearch:v1.7
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-changeme}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - noetia_net
    restart: unless-stopped

  # ─── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - noetia_net
    restart: unless-stopped

  # ─── Node Exporter (host metrics: disk, CPU, memory) ────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.0
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - noetia_net
    restart: unless-stopped

  # ─── cAdvisor (container metrics: restarts, resource usage) ─────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - noetia_net
    restart: unless-stopped

  # ─── Grafana ─────────────────────────────────────────────────────────────────
  monitor:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: changeme
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_ALERTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - noetia_net
    restart: unless-stopped
