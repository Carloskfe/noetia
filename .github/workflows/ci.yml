name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-build:
    name: ${{ matrix.service }} — lint / typecheck / build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, web, worker]

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @noetia/${{ matrix.service }} lint

      - name: Typecheck
        run: pnpm --filter @noetia/${{ matrix.service }} typecheck

      - name: Build
        run: pnpm --filter @noetia/${{ matrix.service }} build
