name: CD

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to production (Contabo)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 84.247.140.175
          username: root
          port: 222
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/noetia

            echo "── Pulling latest code ──────────────────────────"
            git pull origin main

            echo "── Stopping and removing existing containers ────"
            docker compose --env-file .env.production -f docker-compose.server.yml down --remove-orphans --timeout 30 2>/dev/null || true
            docker ps -a --filter "name=noetia-" -q | xargs -r docker rm -f 2>/dev/null || true
            docker network rm noetia_noetia_net 2>/dev/null || true

            echo "── Building and starting containers ─────────────"
            docker compose --env-file .env.production -f docker-compose.server.yml up -d --build

            echo "── Running migrations ───────────────────────────"
            docker compose --env-file .env.production -f docker-compose.server.yml exec -T -e DB_HOST=db api npm run migration:run:prod

            echo "── Cleaning up unused images ────────────────────"
            docker image prune -f

            echo "── Deploy complete ──────────────────────────────"
